name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: assigner
    attributes:
      label: Assigner Details
      placeholder: email@example.com
    
  - type: input
    id: assignee
    attributes:
      label: Assignee Details
      placeholder: email@example.com
      
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: Version
      options:
        - 1.0.2
        - 1.0.3
    validations:
      required: true
      
  - type: checkbox
    id: checkbox1
    attributes:
      label: Issue criticality
      options:
        - sev1
        - sev2
        - sev3
        - sev4
        - relax lol!
